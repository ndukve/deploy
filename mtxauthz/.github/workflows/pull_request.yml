on:
  pull_request:
  workflow_dispatch: # Allow manual triggering

jobs:
  version-check:
    name: Check version increment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pvarki/config-ci-library/.github/actions/validate-bumpversion@main
  pre-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v6
      - uses: pvarki/config-ci-library/.github/actions/setup-python@main
        with:
          python-version: "3.14"
      - uses: pvarki/config-ci-library/.github/actions/setup-typescript@main
        with:
          working-directory: ui
      - name: Do pre-commit checks
        run: |
          uv run prek run --all-files
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    strategy:
      matrix:
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
      - uses: pvarki/config-ci-library/.github/actions/setup-python@main
        with:
          python-version: "3.14"
      - name: Prep docker
        run: |
          docker system prune --all --volumes --force
          cd tests && docker compose -f docker-compose.yml build --pull
          docker compose -f docker-compose.yml pull --ignore-buildable
          docker compose -f docker-compose.yml up -d --wait || docker compose -f docker-compose.yml logs
          docker compose -f docker-compose.yml down -v
      - name: Test with pytest
        run: |
          uv run py.test -v --junitxml=pytest.xml
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: "**/pytest*.xml"
          detailed_summary: true
          check_name: "JUnit report (local)"
  snyk-test:
    name: Run Snyk test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pvarki/config-ci-library/.github/actions/setup-python@main
      - uses: pvarki/config-ci-library/.github/actions/snyk-test@main
        with:
          snyk-org: deployapp-products
          snyk-token: ${{ secrets.SNYK_TOKEN }}

  docker-build-and-verify:
    runs-on: ubuntu-latest # arc-runner-set
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build test target
        run: docker build --target test -t rmmtxauthz:test .
      - name: Build production target
        run: docker build --target production -t rmmtxauthz:production .
  publish:
    name: Publish Docker image
    needs: ["version-check", "pre-commit", "test", "docker-build-and-verify"]
    runs-on: ubuntu-latest # arc-runner-set
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Publish Docker image
        uses: pvarki/config-ci-library/.github/actions/publish-image@main
        with:
          product: mediamtx
          component: integration
          dockerhub-username: ${{ vars.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          acr-repo: ${{ vars.ACR_REPO }}
          acr-username: ${{ vars.ACR_USERNAME }}
          acr-token: ${{ secrets.ACR_TOKEN }}

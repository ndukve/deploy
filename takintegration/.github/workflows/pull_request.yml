on:
  pull_request:
  workflow_dispatch: # Allow manual triggering

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    name: Pre-commit
    steps:
      - uses: actions/checkout@v6
      - uses: pvarki/config-ci-library/.github/actions/setup-python@main
        with:
          python-version: "3.11"
      - uses: pvarki/config-ci-library/.github/actions/setup-typescript@main
        with:
          working-directory: ui
          node-version: "24"
          pnpm-version: "11"
      - name: Run pre-commit checks
        run: |
          uv run docker/pre_commit_init.sh

  bumpversion-check:
    runs-on: ubuntu-latest
    name: Validate .bumpversion.toml
    steps:
      - uses: actions/checkout@v6
      - uses: pvarki/config-ci-library/.github/actions/validate-bumpversion@main

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Build test image
        run: |
          docker build --target test -t takrmapi:test .
      - name: run test image
        run: |
          docker run --rm takrmapi:test
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: success() || failure()
        with:
          report_paths: "**/pytest*.xml"
          detailed_summary: true
          check_name: "JUnit report (local)"

  snyk-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pvarki/config-ci-library/.github/actions/setup-python@main
        with:
          python-version: "3.11"
      - uses: pvarki/config-ci-library/.github/actions/snyk-test@main
        with:
          snyk-org: deployapp-products
          snyk-token: ${{ secrets.SNYK_TOKEN }}

  docker_builds:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build production target
        run: docker build --platform linux/amd64 --target production -t takrmapi:production .

  publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: [pre-commit, bumpversion-check, test, docker_builds]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Publish Docker image
        uses: pvarki/config-ci-library/.github/actions/publish-image@main
        with:
          product: tak
          component: integration
          platforms: linux/amd64
          dockerhub-username: ${{ vars.DOCKERHUB_USERNAME }}
          dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          acr-repo: ${{ vars.ACR_REPO }}
          acr-username: ${{ vars.ACR_USERNAME }}
          acr-token: ${{ secrets.ACR_TOKEN }}

# Official TAK Server — 7-service deployment
# Build once: docker compose build
# Start: docker compose --env-file takserver.env up -d

x-tak: &tak-base
  image: takserver:local
  env_file: takserver.env
  volumes:
    - takserver_data:/opt/tak/data
  networks:
    - taknet
  restart: unless-stopped

services:

  # ── Database ────────────────────────────────────────────────────────────────
  takdb:
    image: postgis/postgis:15-3.3
    env_file: takserver.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cot}
      POSTGRES_USER: ${POSTGRES_USER:-martiuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - takdb_data:/var/lib/postgresql/data
    networks:
      - taknet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-martiuser} -d ${POSTGRES_DB:-cot}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── First-run initialisation (certs + DB schema) ───────────────────────────
  takserver_initialization:
    <<: *tak-base
    build: .
    command: ["/bin/bash", "/opt/scripts/firstrun.sh"]
    depends_on:
      takdb:
        condition: service_healthy
    restart: "no"

  # ── Config service (TAK SSL CoT + HTTPS API) ───────────────────────────────
  takserver_config:
    <<: *tak-base
    command: ["/bin/bash", "/opt/scripts/start-tak.sh", "config"]
    ports:
      - "8089:8089"
      - "8443:8443"
      - "8087:8087"
    depends_on:
      takserver_initialization:
        condition: service_completed_successfully

  # ── Messaging service (shares network namespace with config) ───────────────
  takserver_messaging:
    image: takserver:local
    env_file: takserver.env
    volumes:
      - takserver_data:/opt/tak/data
    restart: unless-stopped
    command: ["/bin/bash", "/opt/scripts/start-tak.sh", "messaging"]
    network_mode: "service:takserver_config"
    depends_on:
      takserver_initialization:
        condition: service_completed_successfully

  # ── API service (shares network namespace with messaging) ──────────────────
  takserver_api:
    image: takserver:local
    env_file: takserver.env
    volumes:
      - takserver_data:/opt/tak/data
    restart: unless-stopped
    command: ["/bin/bash", "/opt/scripts/start-tak.sh", "api"]
    network_mode: "service:takserver_messaging"
    depends_on:
      takserver_initialization:
        condition: service_completed_successfully

  # ── Retention service (shares network namespace with messaging) ────────────
  takserver_retention:
    image: takserver:local
    env_file: takserver.env
    volumes:
      - takserver_data:/opt/tak/data
    restart: unless-stopped
    command: ["/bin/bash", "/opt/scripts/start-tak.sh", "retention"]
    network_mode: "service:takserver_messaging"
    depends_on:
      takserver_initialization:
        condition: service_completed_successfully

  # ── Plugin manager (shares network namespace with messaging) ───────────────
  takserver_pluginmanager:
    image: takserver:local
    env_file: takserver.env
    volumes:
      - takserver_data:/opt/tak/data
      - tak_plugins:/opt/tak/plugins
      - tak_plugin_conf:/opt/tak/conf/plugins
    restart: unless-stopped
    command: ["/bin/bash", "/opt/scripts/start-tak.sh", "pm"]
    network_mode: "service:takserver_messaging"
    depends_on:
      takserver_initialization:
        condition: service_completed_successfully

  # ── Package download server (port 8888) ────────────────────────────────────
  pkg_server:
    image: python:3.11-slim
    command: ["python3", "/srv/serve_packages.py"]
    volumes:
      - takserver_data:/opt/tak/data:ro
      - ./packages/tak-maps:/opt/tak/maps/upstream:ro
      - ./packages/local-maps:/opt/tak/maps/local:ro
      - ./scripts/serve_packages.py:/srv/serve_packages.py:ro
    working_dir: /opt/tak/data
    ports:
      - "8888:8888"
    networks:
      - taknet
    restart: unless-stopped

volumes:
  takdb_data:
  takserver_data:
  tak_plugins:
  tak_plugin_conf:

networks:
  taknet:
    driver: bridge
